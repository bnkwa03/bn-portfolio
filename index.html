<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brian Nkwocha — Researcher</title>
  <meta name="description" content="A researcher who brings product visions to life. Humanist, nature-inspired, modern-natural." />

  <!-- Fonts: Playfair Display (display) + Mulish (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Living background: warm base with a slow-drifting cool light + fine grain -->
  <div class="atmosphere" aria-hidden="true">
    <div class="glow glow--cool"></div>
    <div class="glow glow--warm"></div>
    <div class="grain"></div>
  </div>

  <header class="nav">
    <a href="#" class="nav__mark">BN</a>
    <nav class="nav__links">
      <a href="#work">Work</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <p class="hero__eyebrow reveal">Researcher &middot; Product</p>
      <h1 class="hero__title">
        <span class="reveal" style="--i:0">I&rsquo;m a researcher</span>
        <span class="reveal" style="--i:1">who brings <em>product visions</em></span>
        <span class="reveal" style="--i:2">to life.</span>
      </h1>
      <p class="hero__sub reveal" style="--i:3">
        Translating curiosity into clarity &mdash; turning open questions into
        products people can feel.
      </p>
      <div class="hero__actions reveal" style="--i:4">
        <a href="#work" class="btn btn--primary">View work</a>
        <a href="#contact" class="btn btn--ghost">Get in touch</a>
      </div>
    </section>
  </main>

  <div class="scroll-cue" aria-hidden="true">
    <span>Scroll</span>
    <div class="scroll-cue__line"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
